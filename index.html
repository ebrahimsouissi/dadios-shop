<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DADIOS Fragrance</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" href="favicon.png.png" />

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- NAV -->
  <header class="navbar">
    <div class="logo">DADIOS</div>

  </header>

  <!-- HERO -->
<section class="hero">
  <div class="hero-media">
    <img src="images/dadios-hero.png" alt="Dadios Fragrance" />
  </div>

  <div class="hero-content">
    <h1>Dadios Fragrance</h1>
    <p>Luxury inspired fragrance — crafted to leave a signature.</p>
    <a class="btn-nav" href="#productContainer">Discover the Collection</a>
  </div>
</section>

  <!-- FILTERS -->
  <section class="filters">
    <input type="text" id="searchInput" placeholder="Search perfume..." />
    <button data-cat="all" class="fbtn active">All</button>
    <button data-cat="homme" class="fbtn">Homme</button>
    <button data-cat="femme" class="fbtn">Femme</button>
    <button data-cat="mixte" class="fbtn">Mixte</button>
  </section>

  <!-- PRODUCTS -->
  <section class="products" id="productContainer"></section>

  <!-- MODAL (Perfume Details) -->
  <div id="perfumeModal" class="pmodal" aria-hidden="true">
    <div class="pmodal-card">
      <button id="pmodalClose" class="pmodal-close" aria-label="Close">✕</button>

      <div class="pmodal-head">
        <div>
          <h2 id="pmTitle">—</h2>
          <p id="pmBrand" class="pm-muted">—</p>
        </div>

        <div class="pm-rate">
          <span id="pmRating">—</span>
          <small id="pmVotes">(0)</small>
        </div>
      </div>

      <div class="pmodal-grid">
        <div class="pm-left">
          <img id="pmImg" class="pm-img" src="" alt="">

          <div class="pm-notes">
            <h3>Notes</h3>
            <div id="pmNotes" class="pm-notes-row"></div>
          </div>
        </div>

        <div class="pm-right">
          <div class="pm-box">
            <h3>Accords principaux</h3>
            <div id="pmAccords" class="pm-accords"></div>
          </div>

          <div class="pm-box">
            <h3>Profil olfactif</h3>
            <div class="pm-kpis">
              <div class="pm-kpi"><b id="pmLongevity">—</b><small>Longévité</small></div>
              <div class="pm-kpi"><b id="pmSillage">—</b><small>Sillage</small></div>
            </div>
          </div>

          <div class="pm-box">
            <h3>Journée</h3>
            <!-- SMART: app.js يبدّلها ل pill وحدة -->
            <div id="pmTime" class="pm-pills"></div>
          </div>

          <div class="pm-box">
            <h3>Saison recommandée</h3>
            <!-- SMART: app.js يبدّلها ل pill وحدة -->
            <div id="pmSeasons" class="pm-pills"></div>
          </div>

          <div class="pm-actions">
            <a id="pmOrder" class="pm-order" href="#" target="_blank" rel="noreferrer">Commander</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>© 2026 DADIOS Fragrance — Tunisia</footer>

  <script src="app.js"></script>
</body>
</html>
