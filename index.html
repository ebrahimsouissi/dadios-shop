<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DADIOS — Catalogue</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="logo">DADIOS</div>
      <div class="tag">Fragrance • Catalogue</div>
    </div>
    <a class="btn primary" id="waHeader" href="#" target="_blank" rel="noopener">Commander sur WhatsApp</a>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Parfums — 50ML</h1>
      <p>Choisis ton parfum, ثم اضغط “Commander” باش تبعث طلبك على WhatsApp.</p>
    </section>

    <section class="grid" id="products"></section>

    <section class="info">
      <h2>Livraison & Paiement</h2>
      <ul>
        <li>Paiement à la livraison (COD)</li>
        <li>Commande عبر WhatsApp</li>
      </ul>
    </section>
  </main>

  <footer class="footer">
    <span>© <span id="year"></span> DADIOS</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
